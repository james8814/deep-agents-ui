<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>v5.26 Design System - Login Page</title>
    <style>
      /* CSS VARIABLES FROM globals.css */
      :root {
        /* Tailwind Core */
        --background: 0 0% 100%;
        --foreground: 20 14.3% 4.1%;
        --card: 0 0% 100%;
        --card-foreground: 20 14.3% 4.1%;
        --primary: 262 80% 50%;
        --primary-foreground: 210 40% 96%;
        --border: 214.3 31.8% 91.4%;

        /* v5.26 Design Tokens */
        --color-primary: #7c3aed;
        --text-primary: #1a1816;
        --text-secondary: #5c5650;
        --surface-base: #ffffff;
        --border-default: rgba(0, 0, 0, 0.08);
        --color-error: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        line-height: 1.5;
      }

      .flex {
        display: flex;
      }

      .min-h-screen {
        min-height: 100vh;
      }

      .items-center {
        align-items: center;
      }

      .justify-center {
        justify-content: center;
      }

      .p-4 {
        padding: 1rem;
      }

      .w-full {
        width: 100%;
      }

      .max-w-md {
        max-width: 28rem;
      }

      .space-y-6 > * + * {
        margin-top: 1.5rem;
      }

      .rounded-xl {
        border-radius: 0.75rem;
      }

      .border {
        border: 1px solid;
      }

      .border-border {
        border-color: hsl(var(--border));
      }

      .bg-card {
        background-color: hsl(var(--card));
      }

      .p-8 {
        padding: 2rem;
      }

      .shadow-sm {
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      }

      .space-y-2 > * + * {
        margin-top: 0.5rem;
      }

      .text-center {
        text-align: center;
      }

      .text-2xl {
        font-size: 1.5rem;
      }

      .font-bold {
        font-weight: bold;
      }

      .tracking-tight {
        letter-spacing: -0.02em;
      }

      .text-foreground {
        color: hsl(var(--foreground));
      }

      .text-sm {
        font-size: 0.875rem;
      }

      .text-muted-foreground {
        color: var(--text-secondary);
      }

      .space-y-4 > * + * {
        margin-top: 1rem;
      }

      .space-y-2 {
        display: flex;
        flex-direction: column;
      }

      label {
        display: block;
        font-weight: 500;
        color: var(--text-primary);
        font-size: 0.875rem;
      }

      input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-default);
        border-radius: 0.5rem;
        font-size: 1rem;
        background: hsl(var(--card));
        color: var(--text-primary);
      }

      input:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      }

      button {
        width: 100%;
        padding: 0.75rem;
        background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-weight: 500;
        cursor: pointer;
        transition: transform 150ms;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
      }

      button:active {
        transform: translateY(0);
      }

      .flex-center {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .text-destructive {
        color: var(--color-error);
      }

      .bg-destructive-light {
        background: rgba(239, 68, 68, 0.1);
      }

      .rounded {
        border-radius: 0.375rem;
      }

      .p-3 {
        padding: 0.75rem;
      }

      a {
        color: var(--color-primary);
        text-decoration: none;
        font-weight: 500;
      }

      a:hover {
        text-decoration: underline;
      }

      .design-note {
        background: #f5f3ff;
        border-left: 4px solid var(--color-primary);
        padding: 1rem;
        margin-top: 2rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <div class="flex min-h-screen items-center justify-center p-4">
      <div
        class="w-full max-w-md space-y-6 rounded-xl border border-border bg-card p-8 shadow-sm"
      >
        <!-- Header -->
        <div class="space-y-2 text-center">
          <h1 class="text-2xl font-bold tracking-tight text-foreground">
            登录
          </h1>
          <p class="text-sm text-muted-foreground">输入您的账号信息以继续</p>
        </div>

        <!-- Form -->
        <form class="space-y-4">
          <!-- Username -->
          <div class="space-y-2">
            <label for="username">用户名</label>
            <input
              id="username"
              type="text"
              placeholder="请输入用户名"
            />
          </div>

          <!-- Password -->
          <div class="space-y-2">
            <label for="password">密码</label>
            <input
              id="password"
              type="password"
              placeholder="请输入密码"
            />
          </div>

          <!-- Submit Button -->
          <button type="submit">登录</button>
        </form>

        <!-- Register Link -->
        <p class="text-center text-sm text-muted-foreground">
          还没有账号？
          <a href="/register">注册</a>
        </p>

        <!-- Design Notes -->
        <div class="design-note">
          <strong>v5.26 设计系统已应用:</strong>
          <ul style="margin-top: 0.5rem; margin-left: 1.5rem">
            <li>✅ 白色背景 (--background: 0 0% 100%)</li>
            <li>✅ 紫色主题 (--primary: #7C3AED)</li>
            <li>✅ 设计系统 CSS 变量</li>
            <li>✅ Tailwind CSS 类名映射</li>
            <li>✅ 响应式布局</li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
